<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Si Yo: Memanen Jeruk Numerasi</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fdfaf5; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; overflow: hidden; }
        
        /* Header & Title */
        #header-container { width: 100%; max-width: 1400px; display: flex; justify-content: center; margin-bottom: 5px;}
        .logo-numerasi { height: 120px; width: auto; }
        #title-container { 
            display: flex; align-items: center; gap: 15px; margin-bottom: 15px; background: white; 
            padding: 10px 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); width: 100%; max-width: 1200px;
        }
        .maskot { height: 70px; width: auto; }
        h2 { color: #2d5a27; margin: 0; font-size: 1.5em; }

        /* Layout Utama */
        #main-wrapper { display: flex; gap: 20px; width: 100%; max-width: 1400px; height: 70vh; position: relative; }

        /* Area Kebun (Pusat Aksi) */
        #orchard-canvas { 
            flex: 3; background-image: url('kebun jeruk.jfif'); background-size: cover; background-position: center; 
            border-radius: 20px; position: relative; border: 4px solid #55a630; overflow: hidden;
        }
        .full-tree { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background-image: url('pohin jeruk 1.jfif'); background-size: cover; background-position: center; opacity: 0.9; z-index: 1;
        }
        
        .orange { 
            position: absolute; width: 40px; height: 40px; background-image: url('jeruk 2.jfif'); 
            background-size: contain; background-repeat: no-repeat; cursor: pointer; z-index: 5; 
            transition: transform 0.2s; border-radius: 50%;
        }

        /* Keranjang yang Bisa Digeser */
        #basket { 
            position: absolute; bottom: 40px; left: 100px; width: 100px; height: 80px; 
            background-image: url('dahan jeruk.jfif'); /* Menggunakan dahan sebagai tekstur keranjang atau bisa pakai emoji */
            background-color: rgba(139, 69, 19, 0.8); border: 3px solid #5d4037; border-radius: 0 0 40px 40px;
            cursor: grab; z-index: 10; display: flex; align-items: center; justify-content: center;
            transition: box-shadow 0.3s;
        }
        #basket:active { cursor: grabbing; }
        #basket.full { border: 4px solid #ff9f1c; box-shadow: 0 0 20px #ff9f1c; }
        .basket-label { color: white; font-weight: bold; pointer-events: none; text-shadow: 1px 1px 2px black; }

        /* Sidebar & Gudang */
        #sidebar { width: 350px; display: flex; flex-direction: column; gap: 15px; }
        #storage-area { 
            flex-grow: 1; background: #fff; border-radius: 15px; padding: 15px; border: 3px solid #55a630; 
            display: flex; flex-direction: column; position: relative;
        }
        #storage-dropzone { 
            flex-grow: 1; border: 3px dashed #c5e1a5; border-radius: 10px; margin-top: 10px;
            display: flex; flex-wrap: wrap; align-content: flex-start; gap: 5px; padding: 10px;
        }
        .dropzone-active { background: #f1f8e9; border-color: #55a630 !important; }

        .stored-basket { font-size: 30px; background: #fdf2d9; border: 1px solid #ff9f1c; border-radius: 5px; padding: 2px; }

        #numeracy-logic { background: #fff3e0; padding: 15px; border-radius: 10px; border-left: 5px solid #ff9f1c; margin-top: 10px; }
        #sum-text { font-weight: bold; color: #e67e22; font-size: 2em; text-align: center; display: block; }

        button { background: #e74c3c; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

    <div id="header-container">
        <img src="logo_taman_numerasi-removebg-preview (1).png" alt="Logo" class="logo-numerasi">
    </div>

    <div id="title-container">
        <img src="maskot_taman_numerasi3-removebg-preview (1).png" alt="Si Yo" class="maskot">
        <div id="title-text-area">
            <h2>🍊 Si Yo: Panen & Simpan</h2>
            <p style="margin:0; font-size: 0.8em; color: #7f8c8d;">Geser keranjang ke bawah jeruk, lalu tarik keranjang penuh ke gudang!</p>
        </div>
    </div>

    <div id="main-wrapper">
        <div id="orchard-canvas">
            <div class="full-tree"></div>
            <div id="orange-container"></div>
            
            <div id="basket" draggable="true">
                <span id="basket-text" class="basket-label">0 / 10</span>
            </div>
        </div>

        <div id="sidebar">
            <div id="storage-area">
                <b style="color: #2d5a27;">🏠 Gudang Penyimpanan</b>
                <div id="storage-dropzone">
                    <p id="drop-hint" style="color: #bdc3c7; font-size: 0.8em; text-align: center; width: 100%;">Tarik keranjang penuh ke sini</p>
                </div>
                
                <div id="numeracy-logic">
                    Total Panen:<br>
                    <span id="logic-text">0 Keranjang x 10 Jeruk =</span>
                    <span id="sum-text">0</span>
                </div>
            </div>
            <button onclick="initGame()">Reset Kebun</button>
        </div>
    </div>

    <script>
        let maxCapacity = 10;
        let currentInBasket = 0;
        let storageCount = 0;
        const basket = document.getElementById('basket');
        const canvas = document.getElementById('orchard-canvas');
        const dropzone = document.getElementById('storage-dropzone');

        // --- 1. INISIALISASI GAME ---
        function initGame() {
            const container = document.getElementById('orange-container');
            container.innerHTML = '';
            currentInBasket = 0;
            storageCount = 0;
            updateUI();
            
            // Generate Jeruk secara natural di dahan
            for (let i = 0; i < 100; i++) {
                const orange = document.createElement('div');
                orange.className = 'orange';
                orange.style.left = (5 + Math.random() * 90) + '%';
                orange.style.top = (5 + Math.random() * 70) + '%';
                orange.onclick = function() { pickOrange(this); };
                container.appendChild(orange);
            }
        }

        // --- 2. LOGIKA MEMETIK JERUK ---
        function pickOrange(el) {
            if (currentInBasket >= maxCapacity) {
                alert("Keranjang sudah penuh! Tarik ke gudang dulu.");
                return;
            }

            const orangeRect = el.getBoundingClientRect();
            const basketRect = basket.getBoundingClientRect();

            // Cek apakah keranjang ada di bawah jeruk (dengan toleransi horizontal)
            if (Math.abs(orangeRect.left - basketRect.left) < 80) {
                el.style.transition = "top 0.5s cubic-bezier(0.6, 0.04, 0.98, 0.33)";
                el.style.top = (basketRect.top - canvas.getBoundingClientRect().top) + "px";
                el.style.opacity = "0";
                
                setTimeout(() => {
                    el.remove();
                    currentInBasket++;
                    updateUI();
                }, 500);
            } else {
                alert("Geser dulu keranjangnya ke bawah jeruk ini!");
            }
        }

        // --- 3. MEKANISME DRAG KERANJANG (Di dalam Canvas) ---
        let isDraggingBasket = false;
        basket.onmousedown = function(e) {
            isDraggingBasket = true;
            basket.style.transition = "none";
        };

        document.onmousemove = function(e) {
            if (!isDraggingBasket) return;
            let x = e.clientX - canvas.getBoundingClientRect().left - 50;
            // Batasi agar keranjang tetap dalam canvas
            if (x < 0) x = 0;
            if (x > canvas.offsetWidth - 100) x = canvas.offsetWidth - 100;
            basket.style.left = x + "px";
        };

        document.onmouseup = function() {
            isDraggingBasket = false;
        };

        // --- 4. MEKANISME DRAG KE GUDANG (HTML5 Drag and Drop) ---
        basket.ondragstart = function(e) {
            if (currentInBasket < maxCapacity) {
                e.preventDefault();
                alert("Penuhi dulu keranjangnya sebelum disimpan!");
                return;
            }
            e.dataTransfer.setData("text", "full_basket");
        };

        dropzone.ondragover = function(e) { e.preventDefault(); dropzone.classList.add('dropzone-active'); };
        dropzone.ondragleave = function() { dropzone.classList.remove('dropzone-active'); };
        
        dropzone.ondrop = function(e) {
            e.preventDefault();
            dropzone.classList.remove('dropzone-active');
            const data = e.dataTransfer.getData("text");
            
            if (data === "full_basket") {
                storageCount++;
                currentInBasket = 0;
                
                // Tambah ikon keranjang di gudang
                const item = document.createElement('div');
                item.className = 'stored-basket';
                item.innerText = '🧺';
                dropzone.appendChild(item);
                document.getElementById('drop-hint').style.display = 'none';
                
                // Kembalikan keranjang ke posisi awal
                basket.style.transition = "all 0.5s";
                basket.style.left = "100px";
                
                updateUI();
            }
        };

        function updateUI() {
            document.getElementById('basket-text').innerText = `${currentInBasket} / ${maxCapacity}`;
            if (currentInBasket === maxCapacity) {
                basket.classList.add('full');
            } else {
                basket.classList.remove('full');
            }
            
            const total = storageCount * maxCapacity;
            document.getElementById('logic-text').innerText = `${storageCount} Keranjang x ${maxCapacity} Jeruk =`;
            document.getElementById('sum-text').innerText = total;
        }

        initGame();
    </script>
</body>
</html>
